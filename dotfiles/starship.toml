"$schema" = 'https://starship.rs/config-schema.json'
format = """
[](#9A348E)\
$os\
$username\
[](bg:#DA627D fg:#9A348E)\
$directory\
[](fg:#DA627D bg:#e08e6d)\
$git_branch\
$git_status\
[](fg:#e08e6d bg:#709db5)\
$c\
$cpp\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$python\
$rust\
$scala\
[](fg:#709db5 bg:#06969A)\
$docker_context\
$conda\ 
[](fg:#06969A bg:#33658A)\
$time\
[ ](fg:#33658A)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like   or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:#9A348E"
style_root = "bg:#9A348E"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:#9A348E"
disabled = true # Disabled by default

[directory]
style = "bg:#DA627D"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Development" = "󰲋 "
# Keep in mind that the order matters. For example:
# "Important Documents" = " 󰈙 "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substitute version:
# "Important 󰈙 " = " 󰈙 "

[c]
symbol = " "
style = "bg:#709db5"
format = '[ $symbol]($style)'

[cpp]
symbol = " "
style = "bg:#709db5"
format = '[ $symbol]($style)'

[conda]
symbol = " "
style = "bg:#e08e6d"
format = '[ $symbol(environment)]($style)'

[docker_context]
symbol = " "
style = "bg:#06969A"
format = '[ $symbolcontext ]($style)'

[elixir]
symbol = " "
style = "bg:#709db5"
format = '[ $symbol]($style)'

[elm]
symbol = " "
style = "bg:#709db5"
format = '[ $symbol]($style)'

[git_branch]
symbol = ""
style = "bg:#e08e6d"
format = '[ $symbol $branch]($style)'

[git_status]
style = "bg:#e08e6d"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = " "
style = "bg:#709db5"
format = '[ $symbol]($style)'

[gradle]
style = "bg:#709db5"
format = '[ $symbol]($style)'

[haskell]
symbol = " "
style = "bg:#709db5"
format = '[ $symbol]($style)'

[java]
symbol = " "
style = "bg:#709db5"
format = '[ $symbol]($style)'

[julia]
symbol = " "
style = "bg:#709db5"
format = '[ $symbol]($style)'

[kotlin]
symbol = " "
style = "bg:#709db5"
format = '[ $symbol]($style)'

[lua]
symbol = " "
style = "bg:#709db5"
format = '[ $symbol]($style)'

[nodejs]
symbol = ""
style = "bg:#709db5"
format = '[ $symbol]($style)'

[nim]
symbol = "󰆥 "
style = "bg:#709db5"
format = '[ $symbol]($style)'

